name: Release

on:
  push:
    tags:
      - v*
  # Manual trigger for dry-runs: builds + uploads artifacts to the
  # workflow run but skips the create-release job.
  workflow_dispatch:

jobs:
  build-binaries:
    runs-on: "${{ matrix.os }}"
    permissions:
      id-token: write
      contents: read
      attestations: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - id: version
        shell: bash
        run: |
          echo "version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')" >>"${GITHUB_OUTPUT}"
      - name: cargo install
        shell: bash
        run: cargo install --locked --path . --target '${{ matrix.target }}' --root ./stage
      - name: strip
        run: strip ./stage/bin/matrirc
      - id: package
        shell: bash
        run: |
          name="matrirc-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          file="dist/${name}.tar.gz"
          tar -C stage/bin -czf "${file}" matrirc
          echo "name=${name}" >>"${GITHUB_OUTPUT}"
          echo "file=${file}" >>"${GITHUB_OUTPUT}"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.file }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: ${{ steps.package.outputs.file }}

  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: collect assets
        shell: bash
        run: |
          shopt -s nullglob
          mkdir assets
          mv ./artifacts/*/*.tar.gz ./assets
          cd assets && b2sum * > B2SUMS.txt
      - id: version
        shell: bash
        run: |
          echo "version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')" >>"${GITHUB_OUTPUT}"
      - name: Extract changelog
        if: hashFiles('CHANGELOG.md') != ''
        shell: bash
        run: |
          awk -v r='${{ steps.version.outputs.version }}' \
          '/^## \[/{p = ($0 ~ "\\["r"\\]"); next} p' \
            CHANGELOG.md > ./CHANGELOG-release.md
      - uses: softprops/action-gh-release@v2
        with:
          name: matrirc-${{ steps.version.outputs.version }}
          body_path: ${{ hashFiles('CHANGELOG-release.md') != '' && './CHANGELOG-release.md' || '' }}
          files: "./assets/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
